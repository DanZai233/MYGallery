# MYGallery 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改
#
# Docker 部署说明：
# 1. 复制此文件为 config.yaml
# 2. 根据部署模式修改数据库和存储配置
# 3. 简单部署（docker-compose.simple.yml）使用 SQLite + 本地存储，无需修改
# 4. 完整部署（docker-compose.full.yml）可使用 PostgreSQL + MinIO，需取消注释相应配置
#
# 数据库选择：
# - SQLite：默认，零依赖，适合个人和小规模部署
# - PostgreSQL：适合高并发和大规模部署
# - MySQL：兼容性好，适合传统数据库环境
#
# 存储选择：
# - 本地存储：默认，简单快速
# - MinIO：自建对象存储，适合需要高可用的场景
# - S3：AWS 或兼容 S3 的云存储
# - 阿里云 OSS：国内云存储

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"  # debug, release, test

# 数据库配置
# 支持: sqlite, mysql, postgres
database:
  type: "sqlite"  # sqlite, mysql, postgres
  
  # SQLite 配置
  sqlite:
    path: "./data/mygallery.db"
  
  # MySQL 配置
  mysql:
    host: "localhost"
    port: 3306
    username: "root"
    password: "password"
    database: "mygallery"
    charset: "utf8mb4"
  
  # PostgreSQL 配置
  postgres:
    host: "localhost"
    port: 5432
    username: "postgres"
    password: "password"
    database: "mygallery"
    sslmode: "disable"

# 存储配置
# 支持: local, s3, minio, aliyun
storage:
  type: "local"  # local, s3, minio, aliyun
  
  # 本地存储
  local:
    upload_dir: "./uploads"
    thumbnail_dir: "./uploads/thumbnails"
    url_prefix: "/uploads"  # 访问URL前缀
  
  # AWS S3
  s3:
    region: "us-east-1"
    bucket: "mygallery"
    access_key: "your-access-key"
    secret_key: "your-secret-key"
    endpoint: ""  # 可选，自定义endpoint
    url_prefix: "https://your-bucket.s3.amazonaws.com"
  
  # MinIO
  minio:
    endpoint: "localhost:9000"
    bucket: "mygallery"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    use_ssl: false
    url_prefix: "http://localhost:9000/mygallery"
  
  # 阿里云 OSS
  aliyun:
    endpoint: "oss-cn-hangzhou.aliyuncs.com"
    bucket: "mygallery"
    access_key: "your-access-key"
    secret_key: "your-secret-key"
    url_prefix: "https://mygallery.oss-cn-hangzhou.aliyuncs.com"

# JWT配置
jwt:
  secret: "your-secret-key-change-this-in-production"
  expire_hours: 168  # 7天

# 管理员配置
admin:
  username: "admin"
  password: "admin123"  # 首次启动后会自动加密
  email: "admin@example.com"

# 图片处理配置
image:
  max_upload_size: 52428800  # 50MB (字节)
  allowed_types:
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "image/webp"
  thumbnail:
    width: 400
    height: 400
    quality: 85

# CORS 配置
cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Authorization"

# 应用配置
app:
  name: "MYGallery"
  version: "1.1.4"
  site_title: "MYGallery"
  site_description: "A simple and beautiful photo gallery system"
  pagination:
    page_size: 20

